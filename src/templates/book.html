<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книга</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}> -->
    <link rel="icon" href="https://img.icons8.com/?size=100&id=wNZ3FTgUzSQX&format=png&color=000000" type="image/png">
</head>
<body>
   <h1>Зміст книги</h1>
   <h2>{{ title }}</h2>
    <div id="book-content" data-folder="{{ folder_name }}">
        {{ content|safe }}  <!-- Виводимо перетворений текст книги -->
    </div>

    <div class="book-controls">
        <button id="edit-book-btn" type="button">Редагувати текст</button>
    </div>

    <div id="editor-container" class="editor-container" style="display: none;">
        <div class="editor-header">
            <span>Редактор книги</span>
            <button id="close-editor-btn" type="button">Закрити</button>
        </div>
        <textarea id="book-editor-text" placeholder="Тут буде сирий текст книги..."></textarea>
        <div class="editor-actions">
            <button id="save-book-btn" type="button">Зберегти</button>
            <button id="cancel-book-btn" type="button">Скасувати</button>
        </div>
    </div>

    <div id="translation-box" class="translation-box" style="display: none;"></div>
    <div id="sentence-translation-box" class="sentence-translation-box" style="display: none;"></div>

    <br>

    <div class="saved-translations">
        <h2>Збережені слова</h2>

        <div class="tabs">
            <button class="tab-btn active" data-tab="book">
                Ця книга
            </button>
            <button class="tab-btn" data-tab="all">
                Всі книги
            </button>
        </div>

        <div id="saved-words-list"></div>
    </div>

    <br>
    <a href="/">Назад до списку книг</a> <!-- Посилання на головну сторінку -->

    <script src="{{ url_for('static', filename='js/vocabulary.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <!-- <script src="{{ url_for('static', filename='js/try.js') }}"></script> -->
</body>
</html>
