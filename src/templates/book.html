<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книга</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}> -->
    <link rel="icon" href="https://img.icons8.com/?size=100&id=wNZ3FTgUzSQX&format=png&color=000000" type="image/png">
</head>
<body>
   <h1>Зміст книги</h1>
   <h2>{{ title }}</h2>
    <div id="book-content" data-folder="{{ folder_name }}">
        {{ content|safe }}  <!-- Виводимо перетворений текст книги -->
    </div>

    <div class="book-controls">
        <button id="edit-book-btn" type="button">Редагувати текст</button>
    </div>

    <div id="editor-container" class="editor-container" style="display: none;">
        <div class="editor-header">
            <span>Редактор книги</span>
            <button id="close-editor-btn" type="button">Закрити</button>
        </div>
        <textarea id="book-editor-text" placeholder="Тут буде сирий текст книги..."></textarea>
        <div class="editor-actions">
            <button id="save-book-btn" type="button">Зберегти</button>
            <button id="cancel-book-btn" type="button">Скасувати</button>
        </div>
    </div>

    <div id="translation-box" class="translation-box" style="display: none;"></div>
    <div id="sentence-translation-box" class="sentence-translation-box" style="display: none;"></div>

    <br>

    <div class="saved-translations">
        <h2>Збережені слова</h2>

        <div class="tabs">
            <button class="tab-btn active" data-tab="book">
                Ця книга
            </button>
            <button class="tab-btn" data-tab="all">
                Всі книги
            </button>
        </div>

        <div id="saved-words-list"></div>
    </div>

    <br>
    <a href="/">Назад до списку книг</a> <!-- Посилання на головну сторінку -->

    <!-- Кнопка настроек (шестеренка) -->
    <button id="settings-toggle" class="settings-toggle" title="Параметри">⚙️</button>

    <!-- Панель настроек -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>Параметри</h3>
            <button id="settings-close" class="settings-close">✕</button>
        </div>
        
        <div class="settings-content">
            <!-- Управление размером шрифта -->
            <div class="settings-group">
                <label for="font-size-slider">Розмір шрифту:</label>
                <div class="settings-control">
                    <input type="range" id="font-size-slider" min="12" max="24" value="18">
                    <span id="font-size-display">18px</span>
                </div>
            </div>

            <!-- Выбор языка озвучки -->
            <div class="settings-group">
                <label for="voice-lang-select">Мова озвучення:</label>
                <div class="settings-control">
                    <select id="voice-lang-select">
                        <option value="de" selected>Deutsch</option>
                        <option value="en">English</option>
                        <option value="ru">Русский</option>
                    </select>
                </div>
            </div>

            <!-- Выбор голоса -->
            <div class="settings-group">
                <label for="voice-select">Голос:</label>
                <div class="settings-control">
                    <select id="voice-select"></select>
                </div>
            </div>

            <!-- Скорость озвучки -->
            <div class="settings-group">
                <label for="speech-rate-slider">Швидкість озвучення:</label>
                <div class="settings-control">
                    <input type="range" id="speech-rate-slider" min="0.5" max="2" step="0.05" value="1">
                    <span id="speech-rate-display">1.00x</span>
                </div>
            </div>

            <!-- Тема -->
            <div class="settings-group">
                <label for="theme-toggle">Тема:</label>
                <div class="settings-control">
                    <label class="theme-switch">
                        <input type="checkbox" id="theme-toggle">
                        <span>Світла тема</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/vocabulary.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <!-- <script src="{{ url_for('static', filename='js/try.js') }}"></script> -->
</body>
</html>
